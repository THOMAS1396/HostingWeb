<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .website-title {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .nav {
            display: flex;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
            padding: 15px 25px;
            background-color: #6b8e23;
            /* green color */
            color: white;
            font-size: 18px;
            border-radius: 4px;
            text-align: center;
            transition: 0.3s;
        }

        .nav a:hover {
            background-color: #556b2f;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Login</h1>

        <div class="website-title">
            <strong>Byteforing Website:</strong>
        </div>

        <div class="nav">
            <a href="#">Technology Solution</a>
            <a href="#">About</a>
            <a href="#">Team</a>
        </div>
    </div>

</body>

</html>
